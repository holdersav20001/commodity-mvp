  </defs>
  <rect width="1500" height="760" fill="#f7faf8"/>
  <text x="40" y="58" font-size="28" font-weight="700" font-family="Inter, Arial, sans-serif" fill="#0f172a">MacroSignal Oil: Source To Insight Dataflow</text>
  <g filter="url(#shadow)">
    <g id="eia"><rect x="50" y="110" width="220" height="95" rx="8" fill="#eaf4ee" stroke="#4c8f67" stroke-width="2"/><text x="160" y="135.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#1d3327">EIA weekly petroleum</text>
<text x="160" y="153.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#1d3327">inventories, imports,</text>
<text x="160" y="171.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#1d3327">exports, production,</text>
<text x="160" y="189.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#1d3327">refinery runs</text></g>
<g id="cftc"><rect x="50" y="235" width="220" height="95" rx="8" fill="#edf3ff" stroke="#547fbf" stroke-width="2"/><text x="160" y="269.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#22324c">CFTC CoT futures</text>
<text x="160" y="287.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#22324c">managed money net, open</text>
<text x="160" y="305.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#22324c">interest</text></g>
<g id="shipping"><rect x="50" y="360" width="220" height="95" rx="8" fill="#fff2e4" stroke="#c57a2c" stroke-width="2"/><text x="160" y="385.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#4a2b10">Shipping and geopolitics</text>
<text x="160" y="403.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#4a2b10">Red Sea, Suez, Cape</text>
<text x="160" y="421.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#4a2b10">reroute, origin and</text>
<text x="160" y="439.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#4a2b10">destination routes</text></g>
<g id="macro"><rect x="50" y="485" width="220" height="95" rx="8" fill="#f5efff" stroke="#8060b4" stroke-width="2"/><text x="160" y="519.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#332347">Macro news sources</text>
<text x="160" y="537.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#332347">central banks, OPEC,</text>
<text x="160" y="555.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#332347">growth and demand</text></g>
<g id="ingest"><rect x="350" y="290" width="240" height="115" rx="8" fill="#ffffff" stroke="#4b5563" stroke-width="2"/><text x="470" y="325.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">Backend ingestion adapters</text>
<text x="470" y="343.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">official API first, public</text>
<text x="470" y="361.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">fallback, source metadata</text>
<text x="470" y="379.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">captured</text></g>
<g id="schemas"><rect x="670" y="290" width="240" height="115" rx="8" fill="#ffffff" stroke="#4b5563" stroke-width="2"/><text x="790" y="325.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">Normalized schemas</text>
<text x="790" y="343.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">case study, evidence item,</text>
<text x="790" y="361.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">market observation, route</text>
<text x="790" y="379.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">layer</text></g>
<g id="history"><rect x="990" y="160" width="240" height="105" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/><text x="1110" y="199.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">SQLite history store</text>
<text x="1110" y="217.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">raw observations plus</text>
<text x="1110" y="235.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">refresh dates, ML-ready base</text></g>
<g id="features"><rect x="990" y="325" width="240" height="105" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/><text x="1110" y="355.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">Feature builder</text>
<text x="1110" y="373.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">weekly change, 4-week</text>
<text x="1110" y="391.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">change, z-score, percentile,</text>
<text x="1110" y="409.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">trend</text></g>
<g id="gate"><rect x="990" y="490" width="240" height="105" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="2"/><text x="1110" y="520.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#431407">Evidence gate</text>
<text x="1110" y="538.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#431407">allowed, blocked,</text>
<text x="1110" y="556.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#431407">contradicted before LLM</text>
<text x="1110" y="574.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#431407">output</text></g>
<g id="ui"><rect x="1280" y="325" width="190" height="125" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="1375" y="356.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#164e63">React intelligence</text>
<text x="1375" y="374.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#164e63">workspace</text>
<text x="1375" y="392.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#164e63">map, market data,</text>
<text x="1375" y="410.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#164e63">scenario forecast,</text>
<text x="1375" y="428.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#164e63">analyst memo</text></g>
