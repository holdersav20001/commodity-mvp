<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#374151"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1500" height="760" fill="#f7faf8"/>
  <text x="40" y="58" font-size="28" font-weight="700" font-family="Inter, Arial, sans-serif" fill="#0f172a">Historical Data And ML Forecast Pipeline</text>
  <g filter="url(#shadow)">
    <g id="backfill"><rect x="70" y="165" width="230" height="95" rx="8" fill="#eaf4ee" stroke="#4c8f67" stroke-width="2"/><text x="185" y="199.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#1d3327">Historical backfill</text>
<text x="185" y="217.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#1d3327">EIA since 1980s/1990s, CFTC</text>
<text x="185" y="235.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#1d3327">since 2006</text></g>
<g id="live"><rect x="70" y="320" width="230" height="95" rx="8" fill="#edf3ff" stroke="#547fbf" stroke-width="2"/><text x="185" y="354.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#22324c">Live refresh</text>
<text x="185" y="372.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#22324c">weekly EIA and CFTC pull,</text>
<text x="185" y="390.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#22324c">observed date tracked</text></g>
<g id="store"><rect x="390" y="245" width="260" height="115" rx="8" fill="#ffffff" stroke="#4b5563" stroke-width="2"/><text x="520" y="280.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">Market history repository</text>
<text x="520" y="298.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">SQLite now, migratable to</text>
<text x="520" y="316.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">Postgres, series/date unique</text>
<text x="520" y="334.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">keys</text></g>
<g id="dataset"><rect x="740" y="245" width="260" height="115" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/><text x="870" y="280.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">Training dataset builder</text>
<text x="870" y="298.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">join fundamentals,</text>
<text x="870" y="316.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">positioning, routes, events</text>
<text x="870" y="334.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">and price history</text></g>
<g id="split"><rect x="1085" y="120" width="240" height="95" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="2"/><text x="1205" y="154.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#431407">Time-aware validation</text>
<text x="1205" y="172.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#431407">walk-forward split, no</text>
<text x="1205" y="190.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#431407">future leakage</text></g>
<g id="model"><rect x="1085" y="285" width="240" height="105" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="1205" y="315.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#2e1065">Baseline forecast models</text>
<text x="1205" y="333.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#2e1065">direction classifier and</text>
<text x="1205" y="351.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#2e1065">return model, calibrated</text>
<text x="1205" y="369.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#2e1065">confidence</text></g>
<g id="eval"><rect x="1085" y="455" width="240" height="105" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/><text x="1205" y="485.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#450a0a">Evaluation report</text>
<text x="1205" y="503.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#450a0a">accuracy, MAE, hit rate,</text>
<text x="1205" y="521.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#450a0a">regime and stress-period</text>
<text x="1205" y="539.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#450a0a">checks</text></g>
<g id="api"><rect x="740" y="560" width="260" height="105" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="870" y="590.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#164e63">Prediction API</text>
<text x="870" y="608.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#164e63">scenario inputs plus model</text>
<text x="870" y="626.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#164e63">outputs, evidence and</text>
<text x="870" y="644.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#164e63">confidence attached</text></g>
<g id="ui"><rect x="390" y="560" width="260" height="105" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/><text x="520" y="599.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#052e16">Scenario forecast UI</text>
<text x="520" y="617.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#052e16">baseline, option cases and</text>
<text x="520" y="635.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#052e16">driver impact bands</text></g>
  </g>
  <g><path d="M 300 212.5 C 345 212.5, 345 302.5, 390 302.5" fill="none" stroke="#374151" stroke-width="2"  marker-end="url(#arrow)"/></g>
<g><path d="M 300 367.5 C 345 367.5, 345 302.5, 390 302.5" fill="none" stroke="#374151" stroke-width="2"  marker-end="url(#arrow)"/></g>
<g><path d="M 650 302.5 C 695 302.5, 695 302.5, 740 302.5" fill="none" stroke="#374151" stroke-width="2"  marker-end="url(#arrow)"/></g>
<g><path d="M 1000 302.5 C 1042.5 302.5, 1042.5 167.5, 1085 167.5" fill="none" stroke="#374151" stroke-width="2"  marker-end="url(#arrow)"/></g>
<g><path d="M 1205 215 C 1205 275, 1205 225, 1205 285" fill="none" stroke="#374151" stroke-width="2"  marker-end="url(#arrow)"/></g>
<g><path d="M 1205 390 C 1205 450, 1205 395, 1205 455" fill="none" stroke="#374151" stroke-width="2"  marker-end="url(#arrow)"/></g>
<g><path d="M 1085 337.5 L 1000 612.5" fill="none" stroke="#374151" stroke-width="2"  marker-end="url(#arrow)"/></g>
<g><path d="M 740 612.5 L 650 612.5" fill="none" stroke="#374151" stroke-width="2"  marker-end="url(#arrow)"/></g>
<g><path d="M 1085 507.5 L 1000 302.5" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrow)"/><text x="1042.5" y="397" text-anchor="middle" font-size="13" font-family="Inter, Arial, sans-serif" fill="#6b7280">feedback loop</text></g>
</svg>