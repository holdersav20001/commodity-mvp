<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#374151"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1500" height="760" fill="#f7faf8"/>
  <text x="40" y="58" font-size="28" font-weight="700" font-family="Inter, Arial, sans-serif" fill="#0f172a">Evidence-Gated LLM Workflow</text>
  <g filter="url(#shadow)">
    <g id="case"><rect x="60" y="165" width="220" height="85" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/><text x="170" y="203.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#1e1b4b">Analyst question or case</text>
<text x="170" y="221.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#1e1b4b">Example: why did oil move?</text></g>
<g id="retrieve"><rect x="350" y="155" width="240" height="105" rx="8" fill="#ffffff" stroke="#4b5563" stroke-width="2"/><text x="470" y="185.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">Retrieve evidence</text>
<text x="470" y="203.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">case data, market</text>
<text x="470" y="221.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">observations, route context,</text>
<text x="470" y="239.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#111827">source metadata</text></g>
<g id="bundle"><rect x="670" y="155" width="240" height="105" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/><text x="790" y="185.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">Evidence bundle</text>
<text x="790" y="203.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">claims get source IDs,</text>
<text x="790" y="221.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">dates, confidence and</text>
<text x="790" y="239.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#0f172a">direction</text></g>
<g id="claim"><polygon points="1085,125 1170,210 1085,295 1000,210" fill="#fff7ed" stroke="#d97706" stroke-width="2"/><text x="1085" y="197" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#431407">Claim gate</text>
<text x="1085" y="215" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#431407">allowed, blocked,</text>
<text x="1085" y="233" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#431407">contradicted</text></g>
<g id="llm"><rect x="1250" y="155" width="220" height="105" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/><text x="1360" y="194.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#164e63">LLM memo generation</text>
<text x="1360" y="212.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#164e63">only allowed claims enter</text>
<text x="1360" y="230.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#164e63">prompt, citations required</text></g>
<g id="blocked"><rect x="970" y="405" width="250" height="105" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/><text x="1095" y="444.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#450a0a">Blocked claim log</text>
<text x="1095" y="462.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#450a0a">visible reviewer evidence,</text>
<text x="1095" y="480.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#450a0a">source backlog input</text></g>
<g id="verify"><rect x="1250" y="405" width="220" height="105" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/><text x="1360" y="444.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#2e1065">Post-generation verifier</text>
<text x="1360" y="462.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#2e1065">checks claims still cite</text>
<text x="1360" y="480.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#2e1065">evidence</text></g>
<g id="memo"><rect x="1250" y="610" width="220" height="95" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/><text x="1360" y="644.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#052e16">Analyst Memo tab</text>
<text x="1360" y="662.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#052e16">drivers, evidence notes,</text>
<text x="1360" y="680.5" text-anchor="middle" font-size="14" font-family="Inter, Arial, sans-serif" fill="#052e16">known gaps and confidence</text></g>
  </g>
  <g><path d="M 280 207.5 C 315 207.5, 315 207.5, 350 207.5" fill="none" stroke="#374151" stroke-width="2"  marker-end="url(#arrow)"/></g>
<g><path d="M 590 207.5 C 630 207.5, 630 207.5, 670 207.5" fill="none" stroke="#374151" stroke-width="2"  marker-end="url(#arrow)"/></g>
<g><path d="M 910 207.5 C 955 207.5, 955 210, 1000 210" fill="none" stroke="#374151" stroke-width="2"  marker-end="url(#arrow)"/></g>
<g><path d="M 1170 210 C 1210 210, 1210 207.5, 1250 207.5" fill="none" stroke="#16a34a" stroke-width="2"  marker-end="url(#arrow)"/><text x="1210" y="200.75" text-anchor="middle" font-size="13" font-family="Inter, Arial, sans-serif" fill="#16a34a">allowed</text></g>
<g><path d="M 1085 295 C 1085 355, 1095 345, 1095 405" fill="none" stroke="#dc2626" stroke-width="2"  marker-end="url(#arrow)"/><text x="1090" y="342" text-anchor="middle" font-size="13" font-family="Inter, Arial, sans-serif" fill="#dc2626">blocked or contradicted</text></g>
<g><path d="M 1360 260 C 1360 320, 1360 345, 1360 405" fill="none" stroke="#374151" stroke-width="2"  marker-end="url(#arrow)"/></g>
<g><path d="M 1360 510 C 1360 570, 1360 550, 1360 610" fill="none" stroke="#374151" stroke-width="2"  marker-end="url(#arrow)"/></g>
<g><path d="M 1220 457.5 C 1235 457.5, 1235 657.5, 1250 657.5" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrow)"/><text x="1235" y="549.5" text-anchor="middle" font-size="13" font-family="Inter, Arial, sans-serif" fill="#6b7280">visible gaps</text></g>
</svg>